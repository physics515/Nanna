name: GUI

on:
  pull_request:
    paths:
      - 'gui/**'
      - '.github/workflows/gui.yml'
  push:
    branches: [master]
    paths:
      - 'gui/**'
      - '.github/workflows/gui.yml'
  workflow_dispatch:
  schedule:
    # Nightly — tauri-driver soft smoke (skips when binary/driver missing)
    - cron: '0 7 * * *'

concurrency:
  group: gui-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit / component (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      # Enforced as of 2026-07-24: the tree typechecks with 0 errors, so a new one is a
      # regression, not pre-existing debt. Revert to continue-on-error only with a reason.
      - run: pnpm exec vue-tsc --noEmit

  e2e-web:
    name: Playwright web/dev shell
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run web E2E
        run: pnpm test:e2e
        env:
          CI: '1'
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            gui/playwright-report
            gui/test-results
          retention-days: 14

  tauri-driver-smoke:
    name: Tauri WebDriver smoke (nightly / manual)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Tauri driver soft-smoke
        run: pnpm test:e2e:tauri
